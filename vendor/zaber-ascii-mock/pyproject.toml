[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "zaber-ascii-mock"
version = "0.1.0"
description = "TCP mock server for Zaber ASCII protocol devices, for use in integration tests."
authors = [{ name = "Zaber Technologies Inc.", email = "contact@zaber.com" }]
requires-python = ">=3.12"
dependencies = []

[tool.setuptools.packages.find]
where = ["src"]

[dependency-groups]
dev = [
    "pytest",
    "pytest-asyncio",
    "pyright",
    "ruff~=0.14.0",
]

[tool.ruff]
extend = "zaber-python-tooling-config/zaber-ruff.toml"

[tool.ruff.lint.per-file-ignores]
"tests/**" = [
    "S101",    # assert is how pytest works
    "D101",    # test class names are self-documenting
    "D102",    # test method names are self-documenting
    "D103",    # fixture names are self-documenting
    "PLR2004", # magic values in assertions are intentional expected values
]

[tool.pyright]
extends = "zaber-python-tooling-config/zaber-pyright.toml"
extraPaths = ["src", "."]

[tool.pytest.ini_options]
asyncio_mode = "auto"
